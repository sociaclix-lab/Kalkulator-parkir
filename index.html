<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Parkir Mall</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full bg-slate-800 rounded-3xl shadow-2xl p-8 border border-slate-700">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold mb-2">🚗 Cek Tarif Parkir</h1>
            <p class="text-slate-400 text-sm">Hitung estimasi biaya parkirmu dengan cepat.</p>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block text-sm font-medium mb-2 text-slate-300">Jam Masuk</label>
                <input type="time" id="jamMasuk" class="w-full bg-slate-700 border border-slate-600 rounded-xl px-4 py-3 focus:ring-2 focus:ring-green-500 outline-none transition-all">
            </div>

            <div>
                <label class="block text-sm font-medium mb-2 text-slate-300">Jam Keluar</label>
                <input type="time" id="jamKeluar" class="w-full bg-slate-700 border border-slate-600 rounded-xl px-4 py-3 focus:ring-2 focus:ring-green-500 outline-none transition-all">
            </div>

            <div>
                <label class="block text-sm font-medium mb-2 text-slate-300">Tarif Per Jam (Rp)</label>
                <input type="number" id="tarif" placeholder="Contoh: 5000" class="w-full bg-slate-700 border border-slate-600 rounded-xl px-4 py-3 focus:ring-2 focus:ring-green-500 outline-none transition-all">
            </div>

            <button onclick="hitungParkir()" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-4 rounded-xl shadow-lg transform active:scale-95 transition-all">
                Hitung Sekarang
            </button>
        </div>

        <div id="hasilContainer" class="hidden mt-8 p-6 bg-slate-700/50 rounded-2xl border border-green-500/30 text-center animate-fade-in">
            <p class="text-slate-400 text-sm mb-1">Total Durasi: <span id="durasiTeks" class="text-white font-semibold"></span></p>
            <p class="text-slate-400 text-sm mb-2">Estimasi Bayar:</p>
            <h2 id="totalBayar" class="text-4xl font-black text-green-400"></h2>
        </div>
    </div>

    <script>
        function hitungParkir() {
            const masuk = document.getElementById('jamMasuk').value;
            const keluar = document.getElementById('jamKeluar').value;
            const tarif = document.getElementById('tarif').value;

            if (!masuk || !keluar || !tarif) {
                alert("Mohon isi semua data ya!");
                return;
            }

            // Konversi ke menit
            const [h1, m1] = masuk.split(':').map(Number);
            const [h2, m2] = keluar.split(':').map(Number);
            
            let menitMasuk = h1 * 60 + m1;
            let menitKeluar = h2 * 60 + m2;

            // Handle jika keluar lewat tengah malam
            if (menitKeluar < menitMasuk) {
                menitKeluar += 24 * 60;
            }

            const selisihMenit = menitKeluar - menitMasuk;
            const jamBulat = Math.ceil(selisihMenit / 60); // Pembulatan ke atas
            const total = jamBulat * tarif;

            // Tampilkan Hasil
            document.getElementById('hasilContainer').classList.remove('hidden');
            document.getElementById('durasiTeks').innerText = `${Math.floor(selisihMenit / 60)} Jam ${selisihMenit % 60} Menit`;
            document.getElementById('totalBayar').innerText = `Rp ${total.toLocaleString('id-ID')}`;
        }
    </script>
</body>
</html>
